<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Ribbon simulation viewer — shear+twist</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
			body { font-family: Monospace; background-color: #1a1a1a; color: #fff; }
			#myCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
			#info {
				position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
				text-align: center; z-index: 100; display: block;
				background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px;
				border-radius: 6px; max-width: 90%;
			}
			#info.error { color: #f88; }
			#controls {
				position: absolute; top: 40px; left: 10px; z-index: 100;
				background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px;
			}
			#controls label { margin-right: 8px; }
			#timeSlider { width: 200px; vertical-align: middle; }
			#progressWrap {
				position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
				width: 280px; z-index: 101; background: rgba(0,0,0,0.85);
				padding: 16px 20px; border-radius: 8px; text-align: center;
			}
			#progressBar { width: 100%; height: 12px; margin-top: 10px;
				background: #333; border-radius: 6px; overflow: hidden; }
			#progressFill { height: 100%; width: 0%; background: #88ccff; transition: width 0.15s ease; }
		</style>
	</head>
	<body>
		<div id="info">Loading ribbon_data.json…</div>
		<div id="progressWrap" style="display: none;">
			<div id="progressText">Downloading… 0%</div>
			<div id="progressBar"><div id="progressFill"></div></div>
		</div>
		<div id="controls" style="display: none;">
			<label>Time (s):</label>
			<input type="range" id="timeSlider" min="0" max="1" value="0" step="any">
			<span id="timeLabel">0.00 / 0.00</span>
			<button id="playBtn">Play</button>
			<button id="pauseBtn">Pause</button>
		</div>
		<div id="timestamp" style="display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); font-size: 22px; font-weight: bold; color: #111; background: rgba(255,255,255,0.95); padding: 6px 14px; border-radius: 6px; z-index: 102; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">t = 0.00 s</div>
		<canvas id="myCanvas" style="display: block;"></canvas>

		<script src="https://unpkg.com/three@0.132.2/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
		<script src="https://unpkg.com/three@0.132.2/examples/js/libs/stats.min.js"></script>
		<script>
			// ========== SCENE PARAMETERS ==========
			var displayScale = 10;
			var playbackSpeed = 1.0;
			var groundSize = 2.8, groundThick = 0.04;
			var groundXOffset = 0.2, groundYOffset = -0.35, groundZOffset = 0.0;
			// Rail box sizes (in metres; scaled by displayScale). Rail's local frame:
			// x-local = ribbon tangent, y-local = ribbon surface normal (out of plane),
			// z-local = ribbon width direction. So BoxGeometry(alongLength, height, width).
			var railAlongLengthM = 0.02;
			var railHeightM      = 0.02;
			var railWidthM       = 0.04;  // a bit wider than ribbon width so it "clamps" the edge
			var railNormalOffsetM = 0.0;  // shift along ribbon normal (0 = centred on ribbon plane)
			var shadowNear = 0.1, shadowFar = 15, shadowHalfSize = 3;

			// HUD labels: shear_n_twist runs shear_u0=0.005 m/s AND w0=0.15 rad/s
			// simultaneously starting at t=2.55 s. Free span L_c = 0.08 m.
			var BC_SHEAR_U0 = 0.005, BC_W0 = 0.15, BC_PHASE2_START = 2.55, BC_LC = 0.08;
			function hudLabel(tSim) {
				var dt = Math.max(tSim - BC_PHASE2_START, 0);
				return [
					'ΔW / L    = ' + (BC_SHEAR_U0 * dt / BC_LC).toFixed(3),
					'Θ_end / L = ' + (BC_W0 * dt / BC_LC).toFixed(2) + ' rad/m'
				];
			}
			// ========== end SCENE PARAMETERS ==========

			var camera, scene, renderer, clock, stats, controls;
			var dirLight;
			var ribbonMesh = null;
			var guideRailStart = null, guideRailEnd = null;
			var hudScene, hudCamera, hudSprite, hudCanvas2D, hudCtx, hudTexture;
			var ribbonData = null;
			var currentFrame = 0, simTime = 0, totalSimTime = 0;
			var frameTimes = [];
			var playing = false;

			function bboxFromFrame(frame) {
				var v = frame.vertices;
				var minX=1e30,minY=1e30,minZ=1e30,maxX=-1e30,maxY=-1e30,maxZ=-1e30;
				for (var i = 0; i < v.length; i += 3) {
					var x=v[i], y=v[i+1], z=v[i+2];
					if(x<minX)minX=x; if(x>maxX)maxX=x;
					if(y<minY)minY=y; if(y>maxY)maxY=y;
					if(z<minZ)minZ=z; if(z>maxZ)maxZ=z;
				}
				return {
					center: [(minX+maxX)/2,(minY+maxY)/2,(minZ+maxZ)/2],
					size: Math.max(maxX-minX, maxY-minY, maxZ-minZ) || 1
				};
			}

			function init() {
				initScene();
				initMisc();
				if (!document.body.contains(renderer.domElement))
					document.body.appendChild(renderer.domElement);
				window.addEventListener('resize', onWindowResize, false);

				if (!(ribbonData && ribbonData.frames && ribbonData.frames.length > 0)) {
					document.getElementById('info').textContent = 'No ribbon data.';
					return;
				}

				frameTimes = ribbonData.frame_times || [];
				if (frameTimes.length !== ribbonData.n_frames) {
					frameTimes = [];
					for (var i = 0; i < ribbonData.n_frames; i++) frameTimes.push(i);
				}
				totalSimTime = frameTimes.length > 0 ? frameTimes[frameTimes.length - 1] : 0;
				if (totalSimTime <= 0 && ribbonData.n_frames > 1) totalSimTime = 1;
				document.getElementById('info').textContent =
					'Ribbon: ' + ribbonData.n_frames + ' frames, ' + totalSimTime.toFixed(2) + ' s — click Play';
				document.getElementById('controls').style.display = 'block';
				var slider = document.getElementById('timeSlider');
				slider.max = Math.max(0, totalSimTime);
				slider.value = 0;
				simTimeToFrame();
				updateTimeLabel();
				slider.addEventListener('input', function() {
					simTime = parseFloat(slider.value);
					simTimeToFrame();
					updateTimeLabel();
					updateRibbonAndRails();
				});
				document.getElementById('playBtn').addEventListener('click', function() { playing = true; });
				document.getElementById('pauseBtn').addEventListener('click', function() { playing = false; });
				updateRibbonAndRails();
				var frame0 = ribbonData.frames[0];
				if (frame0 && frame0.vertices && frame0.vertices.length >= 3) {
					var box = bboxFromFrame(frame0);
					var cx = box.center[0] * displayScale, cy = box.center[1] * displayScale, cz = box.center[2] * displayScale;
					var size = Math.max(box.size * displayScale, 0.5);
					var dist = size * 2.2;
					camera.position.set(cx + dist*0.4, cy + dist*0.8, cz + dist*0.6);
					controls.target.set(cx, cy, cz);
					controls.update();
				}
				document.getElementById('timestamp').style.display = 'block';
			}

			function initScene() {
				camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 1000);
				camera.up.set(0, 1, 0);
				camera.position.set(0.5, 0.5, 0.8);
				scene = new THREE.Scene();
				scene.background = new THREE.Color(0xffffff);
				scene.add(new THREE.AmbientLight(0x666666));
				dirLight = new THREE.DirectionalLight(0xcccccc, 1.2);
				dirLight.position.set(5, 8, 5);
				dirLight.castShadow = true;
				dirLight.shadow.camera.near = shadowNear; dirLight.shadow.camera.far = shadowFar;
				dirLight.shadow.camera.right = shadowHalfSize; dirLight.shadow.camera.left = -shadowHalfSize;
				dirLight.shadow.camera.top = shadowHalfSize; dirLight.shadow.camera.bottom = -shadowHalfSize;
				dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
				scene.add(dirLight);
				var materialBK = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 5, specular: 0x333333 });
				var ground = new THREE.Mesh(new THREE.BoxGeometry(groundSize, groundThick, groundSize), materialBK);
				ground.position.set(groundXOffset, groundYOffset, groundZOffset);
				ground.receiveShadow = true;
				scene.add(ground);
				clock = new THREE.Clock();
			}

			function initMisc() {
				var canvas = document.getElementById('myCanvas');
				renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				renderer.shadowMap.enabled = true;
				renderer.shadowMap.type = THREE.BasicShadowMap;
				renderer.autoClear = false;
				controls = new THREE.OrbitControls(camera, renderer.domElement);
				controls.target.set(0.05, 0, 0);
				controls.update();
				try { stats = new Stats(); document.body.appendChild(stats.dom); } catch (e) { stats = null; }
				initHud();
			}

			function initHud() {
				hudCanvas2D = document.createElement('canvas');
				hudCanvas2D.width = 1024; hudCanvas2D.height = 192;
				hudCtx = hudCanvas2D.getContext('2d');
				hudTexture = new THREE.CanvasTexture(hudCanvas2D);
				hudTexture.minFilter = THREE.LinearFilter;
				var mat = new THREE.SpriteMaterial({ map: hudTexture, transparent: true, depthTest: false });
				hudSprite = new THREE.Sprite(mat);
				hudSprite.center.set(0, 1);
				hudScene = new THREE.Scene();
				hudScene.add(hudSprite);
				hudCamera = new THREE.OrthographicCamera(0, window.innerWidth, window.innerHeight, 0, -1, 1);
				layoutHud();
			}

			function layoutHud() {
				if (!hudSprite || !hudCamera) return;
				hudCamera.left = 0; hudCamera.right = window.innerWidth;
				hudCamera.top = window.innerHeight; hudCamera.bottom = 0;
				hudCamera.updateProjectionMatrix();
				var w = hudCanvas2D.width * 0.5, h = hudCanvas2D.height * 0.5;
				hudSprite.scale.set(w, h, 1);
				hudSprite.position.set(16, window.innerHeight - 16, 0);
			}

			function updateHud(tSim) {
				var lines = hudLabel(tSim);
				if (typeof lines === 'string') lines = [lines];
				var c = hudCtx, W = hudCanvas2D.width, H = hudCanvas2D.height;
				c.clearRect(0, 0, W, H);
				c.fillStyle = 'rgba(255,255,255,0.88)';
				c.fillRect(0, 0, W, H);
				c.strokeStyle = 'rgba(0,0,0,0.35)';
				c.lineWidth = 3;
				c.strokeRect(1.5, 1.5, W - 3, H - 3);
				c.fillStyle = '#111';
				c.font = 'bold 56px monospace';
				c.textBaseline = 'top';
				for (var i = 0; i < lines.length; i++) c.fillText(lines[i], 24, 16 + i * 68);
				hudTexture.needsUpdate = true;
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
				layoutHud();
			}

			function simTimeToFrame() {
				if (!frameTimes.length) { currentFrame = 0; return; }
				var i = 0;
				while (i < frameTimes.length - 1 && frameTimes[i+1] <= simTime) i++;
				if (simTime < frameTimes[i] && i > 0) i--;
				currentFrame = Math.min(i, frameTimes.length - 1);
			}

			function updateTimeLabel() {
				var el = document.getElementById('timestamp');
				if (el) el.textContent = 't = ' + simTime.toFixed(2) + ' s';
				var label = document.getElementById('timeLabel');
				if (label) label.textContent = simTime.toFixed(2) + ' / ' + totalSimTime.toFixed(2);
			}

			function getFrameData(i) {
				if (!ribbonData || !ribbonData.frames || i < 0 || i >= ribbonData.frames.length) return null;
				return ribbonData.frames[i];
			}

			function buildOrUpdateRibbon(frame) {
				if (ribbonMesh) scene.remove(ribbonMesh);
				var raw = frame.vertices;
				var vertices = new Float32Array(raw.length);
				for (var i = 0; i < raw.length; i++) vertices[i] = raw[i] * displayScale;
				var geometry = new THREE.BufferGeometry();
				geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
				geometry.setIndex(frame.faces);
				geometry.computeVertexNormals();
				var material = new THREE.MeshPhongMaterial({
					color: 0x88ccff, shininess: 100, specular: 0x9999ff, side: THREE.DoubleSide
				});
				ribbonMesh = new THREE.Mesh(geometry, material);
				ribbonMesh.castShadow = true;
				scene.add(ribbonMesh);
			}

			function makeRail() {
				var geom = new THREE.BoxGeometry(
					railAlongLengthM * displayScale,
					railHeightM * displayScale,
					railWidthM * displayScale
				);
				var mat = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 0, specular: 0x888888 });
				var m = new THREE.Mesh(geom, mat);
				m.castShadow = true; m.receiveShadow = true;
				return m;
			}

			function orientRail(mesh, railFrame) {
				// Local axes: x=tangent, y=normal, z=width_dir. Build matrix directly.
				var t = railFrame.tangent, n = railFrame.normal, w = railFrame.width_dir, o = railFrame.origin;
				var tv = new THREE.Vector3(t[0], t[1], t[2]);
				var nv = new THREE.Vector3(n[0], n[1], n[2]);
				var wv = new THREE.Vector3(w[0], w[1], w[2]);
				mesh.matrixAutoUpdate = false;
				mesh.matrix.makeBasis(tv, nv, wv);
				mesh.matrix.setPosition(
					(o[0] + n[0] * railNormalOffsetM) * displayScale,
					(o[1] + n[1] * railNormalOffsetM) * displayScale,
					(o[2] + n[2] * railNormalOffsetM) * displayScale
				);
				mesh.updateMatrixWorld(true);
			}

			function updateRibbonAndRails() {
				var frame = getFrameData(currentFrame);
				if (!frame) return;
				buildOrUpdateRibbon(frame);
				if (frame.rails) {
					if (!guideRailStart) { guideRailStart = makeRail(); scene.add(guideRailStart); }
					if (!guideRailEnd)   { guideRailEnd   = makeRail(); scene.add(guideRailEnd); }
					orientRail(guideRailStart, frame.rails.start);
					orientRail(guideRailEnd,   frame.rails.end);
				}
			}

			function setProgress(pct, text) {
				var wrap = document.getElementById('progressWrap');
				var fill = document.getElementById('progressFill');
				var txt = document.getElementById('progressText');
				if (pct >= 0) { wrap.style.display = 'block';
					fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
					if (text) txt.textContent = text;
				} else wrap.style.display = 'none';
			}

			function loadDataAndInit() {
				if (typeof ribbonData !== 'undefined' && ribbonData && ribbonData.frames) { init(); return; }
				setProgress(0, 'Downloading… 0%');
				fetch('ribbon_data.json')
					.then(function(r) {
						if (!r.ok) throw new Error('HTTP ' + r.status);
						return r.json();
					})
					.then(function(d) {
						ribbonData = d;
						setProgress(-1);
						init();
					})
					.catch(function(e) {
						setProgress(-1);
						var info = document.getElementById('info');
						info.textContent = 'Load failed: ' + e.message + ' — serve this folder (python -m http.server 8765).';
						info.className = 'error';
					});
			}

			function animate() {
				requestAnimationFrame(animate);
				if (scene && camera && renderer) {
					updateHud(simTime);
					renderer.clear();
					renderer.render(scene, camera);
					renderer.clearDepth();
					renderer.render(hudScene, hudCamera);
				}
				if (stats) stats.update();
				if (playing && ribbonData && ribbonData.frames && ribbonData.frames.length > 0) {
					var dt = clock.getDelta();
					simTime += dt * playbackSpeed;
					if (simTime >= totalSimTime) simTime = 0;
					if (simTime < 0) simTime = totalSimTime;
					simTimeToFrame();
					updateTimeLabel();
					updateRibbonAndRails();
				}
			}

			loadDataAndInit();
			animate();
		</script>
	</body>
</html>
