<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Ribbon — PNG snapshots (shear+twist)</title>
		<meta charset="utf-8">
		<style>
			body { font-family: Monospace; background-color: #000; color: #fff; margin: 0; overflow: hidden; }
			#info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; }
		</style>
	</head>
	<body>
		<div id="info">Preparing snapshots…</div>
		<canvas id="myCanvas"></canvas>
		<script src="https://unpkg.com/three@0.132.2/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
		<script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
		<script src="ribbon_data.js"></script>
		<script>
			// Match viewer scene params
			var displayScale = 10;
			var groundSize = 2.8, groundThick = 0.04;
			var groundXOffset = 0.2, groundYOffset = -0.35, groundZOffset = 0.0;
			var railAlongLengthM = 0.02, railHeightM = 0.02, railWidthM = 0.04, railNormalOffsetM = 0.0;
			var shadowNear = 0.1, shadowFar = 15, shadowHalfSize = 3;

			var SNAPSHOT_FPS = 30;
			var cameraDistFactor = 1.2;
			var cameraOffsetX = 0.4, cameraOffsetY = 0.6, cameraOffsetZ = 0.3;
			var cameraFixed = true;
			var cameraPosition = { x: 1.2, y: 0.6, z: 1 };
			var cameraTarget = { x: 0.2, y: 0.075, z: -0.3 };

			// HUD labels: shear_n_twist runs shear_u0=0.005 m/s AND w0=0.15 rad/s
			// simultaneously starting at t=2.55 s. Free span L_c = 0.08 m.
			var BC_SHEAR_U0 = 0.005, BC_W0 = 0.15, BC_PHASE2_START = 2.55, BC_LC = 0.08;
			function hudLabel(tSim) {
				var dt = Math.max(tSim - BC_PHASE2_START, 0);
				return [
					'ΔW / L    = ' + (BC_SHEAR_U0 * dt / BC_LC).toFixed(3),
					'Θ_end / L = ' + (BC_W0 * dt / BC_LC).toFixed(2) + ' rad/m'
				];
			}

			var camera, scene, renderer, dirLight;
			var ribbonMesh = null, guideRailStart = null, guideRailEnd = null;
			var hudScene, hudCamera, hudSprite, hudCanvas2D, hudCtx, hudTexture;
			var ribbonData = typeof ribbonData !== 'undefined' ? ribbonData : null;
			var frameTimes = [], totalSimTime = 0, capturer = null, canvas = null;
			var snapshotIndex = 0, numSnapshots = 0, snapshotSimDt = 0;
			var capturing = false, finished = false;

			function bboxFromFrame(frame) {
				var v = frame.vertices;
				var minX=1e30,minY=1e30,minZ=1e30,maxX=-1e30,maxY=-1e30,maxZ=-1e30;
				for (var i=0;i<v.length;i+=3){var x=v[i],y=v[i+1],z=v[i+2];
					if(x<minX)minX=x;if(x>maxX)maxX=x;
					if(y<minY)minY=y;if(y>maxY)maxY=y;
					if(z<minZ)minZ=z;if(z>maxZ)maxZ=z;}
				return {center:[(minX+maxX)/2,(minY+maxY)/2,(minZ+maxZ)/2],
						size:Math.max(maxX-minX,maxY-minY,maxZ-minZ)||1};
			}

			function init() {
				canvas = document.getElementById('myCanvas');
				initScene(); initMisc();
				document.body.appendChild(renderer.domElement);
				window.addEventListener('resize', onResize, false);
				if (!ribbonData || !ribbonData.frames || ribbonData.frames.length === 0) {
					document.getElementById('info').textContent = 'No ribbon data.';
					return;
				}
				frameTimes = ribbonData.frame_times || [];
				totalSimTime = frameTimes.length ? frameTimes[frameTimes.length-1] : 0;
				snapshotSimDt = 1 / SNAPSHOT_FPS;
				numSnapshots = Math.max(1, Math.ceil(totalSimTime * SNAPSHOT_FPS));
				var frame0 = ribbonData.frames[0];
				if (cameraFixed) {
					camera.position.set(cameraPosition.x, cameraPosition.y, cameraPosition.z);
					camera.lookAt(cameraTarget.x, cameraTarget.y, cameraTarget.z);
				} else if (frame0) {
					var box = bboxFromFrame(frame0);
					var cx=box.center[0]*displayScale, cy=box.center[1]*displayScale, cz=box.center[2]*displayScale;
					var size=Math.max(box.size*displayScale, 0.5), dist=size*cameraDistFactor;
					camera.position.set(cx + dist*cameraOffsetX, cy + dist*cameraOffsetY, cz + dist*cameraOffsetZ);
					camera.lookAt(cx, cy, cz);
				}
				capturer = new CCapture({ format: 'png', framerate: SNAPSHOT_FPS });
				capturing = true;
				document.getElementById('info').textContent = 'Capturing ' + numSnapshots + ' snapshots at ' + SNAPSHOT_FPS + ' fps…';
				requestAnimationFrame(animate);
			}

			function initScene() {
				camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 1000);
				camera.up.set(0,1,0);
				scene = new THREE.Scene();
				scene.background = new THREE.Color(0xffffff);
				scene.add(new THREE.AmbientLight(0x666666));
				dirLight = new THREE.DirectionalLight(0xcccccc, 1.2);
				dirLight.position.set(5,8,5);
				dirLight.castShadow = true;
				dirLight.shadow.camera.near = shadowNear; dirLight.shadow.camera.far = shadowFar;
				dirLight.shadow.camera.right = shadowHalfSize; dirLight.shadow.camera.left = -shadowHalfSize;
				dirLight.shadow.camera.top = shadowHalfSize; dirLight.shadow.camera.bottom = -shadowHalfSize;
				dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
				scene.add(dirLight);
				var mat = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 5, specular: 0x333333 });
				var ground = new THREE.Mesh(new THREE.BoxGeometry(groundSize, groundThick, groundSize), mat);
				ground.position.set(groundXOffset, groundYOffset, groundZOffset);
				ground.receiveShadow = true;
				scene.add(ground);
			}

			function initMisc() {
				renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				renderer.shadowMap.enabled = true;
				renderer.shadowMap.type = THREE.BasicShadowMap;
				renderer.autoClear = false;  // HUD pass must not clear the main render.
				initHud();
			}

			function initHud() {
				hudCanvas2D = document.createElement('canvas');
				hudCanvas2D.width = 1024; hudCanvas2D.height = 192;
				hudCtx = hudCanvas2D.getContext('2d');
				hudTexture = new THREE.CanvasTexture(hudCanvas2D);
				hudTexture.minFilter = THREE.LinearFilter;
				var mat = new THREE.SpriteMaterial({ map: hudTexture, transparent: true });
				hudSprite = new THREE.Sprite(mat);
				hudSprite.center.set(0, 1);  // anchor top-left of sprite
				hudScene = new THREE.Scene();
				hudScene.add(hudSprite);
				hudCamera = new THREE.OrthographicCamera(0, window.innerWidth, window.innerHeight, 0, -1, 1);
				layoutHud();
			}

			function layoutHud() {
				if (!hudSprite || !hudCamera) return;
				hudCamera.left = 0; hudCamera.right = window.innerWidth;
				hudCamera.top = window.innerHeight; hudCamera.bottom = 0;
				hudCamera.updateProjectionMatrix();
				// Sprite in screen-space pixel coords: anchor top-left, fixed size.
				var w = hudCanvas2D.width * 0.5, h = hudCanvas2D.height * 0.5;
				hudSprite.scale.set(w, h, 1);
				hudSprite.position.set(16, window.innerHeight - 16, 0);
			}

			function updateHud(tSim) {
				var lines = hudLabel(tSim);
				if (typeof lines === 'string') lines = [lines];
				var c = hudCtx, W = hudCanvas2D.width, H = hudCanvas2D.height;
				c.clearRect(0, 0, W, H);
				c.fillStyle = 'rgba(255,255,255,0.88)';
				c.fillRect(0, 0, W, H);
				c.strokeStyle = 'rgba(0,0,0,0.35)';
				c.lineWidth = 3;
				c.strokeRect(1.5, 1.5, W - 3, H - 3);
				c.fillStyle = '#111';
				c.font = 'bold 56px monospace';
				c.textBaseline = 'top';
				for (var i = 0; i < lines.length; i++) {
					c.fillText(lines[i], 24, 16 + i * 68);
				}
				hudTexture.needsUpdate = true;
			}

			function onResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
				layoutHud();
			}

			function simTimeToFrame(t) {
				if (!frameTimes.length || t <= frameTimes[0]) return 0;
				if (t >= frameTimes[frameTimes.length-1]) return frameTimes.length-1;
				for (var i = frameTimes.length-1; i >= 0; i--)
					if (frameTimes[i] <= t) return i;
				return 0;
			}

			function makeRail() {
				var g = new THREE.BoxGeometry(
					railAlongLengthM * displayScale,
					railHeightM * displayScale,
					railWidthM * displayScale);
				var mat = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 0, specular: 0x888888 });
				var m = new THREE.Mesh(g, mat);
				m.castShadow = true; m.receiveShadow = true;
				return m;
			}

			function orientRail(mesh, rf) {
				var t = rf.tangent, n = rf.normal, w = rf.width_dir, o = rf.origin;
				var tv = new THREE.Vector3(t[0], t[1], t[2]);
				var nv = new THREE.Vector3(n[0], n[1], n[2]);
				var wv = new THREE.Vector3(w[0], w[1], w[2]);
				mesh.matrixAutoUpdate = false;
				mesh.matrix.makeBasis(tv, nv, wv);
				mesh.matrix.setPosition(
					(o[0] + n[0]*railNormalOffsetM) * displayScale,
					(o[1] + n[1]*railNormalOffsetM) * displayScale,
					(o[2] + n[2]*railNormalOffsetM) * displayScale);
				mesh.updateMatrixWorld(true);
			}

			function updateSceneForFrame(i) {
				var frame = ribbonData.frames[i]; if (!frame) return;
				if (ribbonMesh) scene.remove(ribbonMesh);
				var raw = frame.vertices, verts = new Float32Array(raw.length);
				for (var j = 0; j < raw.length; j++) verts[j] = raw[j] * displayScale;
				var g = new THREE.BufferGeometry();
				g.setAttribute('position', new THREE.BufferAttribute(verts, 3));
				g.setIndex(frame.faces);
				g.computeVertexNormals();
				var m = new THREE.MeshPhongMaterial({ color: 0x88ccff, shininess: 100, specular: 0x9999ff, side: THREE.DoubleSide });
				ribbonMesh = new THREE.Mesh(g, m);
				ribbonMesh.castShadow = true;
				scene.add(ribbonMesh);
				if (frame.rails) {
					if (!guideRailStart) { guideRailStart = makeRail(); scene.add(guideRailStart); }
					if (!guideRailEnd)   { guideRailEnd   = makeRail(); scene.add(guideRailEnd); }
					orientRail(guideRailStart, frame.rails.start);
					orientRail(guideRailEnd,   frame.rails.end);
				}
			}

			function animate() {
				if (!capturing || finished) return;
				if (snapshotIndex === 0) capturer.start(canvas);
				var t = Math.min(snapshotIndex * snapshotSimDt, totalSimTime);
				updateSceneForFrame(simTimeToFrame(t));
				updateHud(t);
				renderer.clear();
				renderer.render(scene, camera);
				renderer.clearDepth();
				renderer.render(hudScene, hudCamera);
				capturer.capture(canvas);
				document.getElementById('info').textContent = 'Snapshot ' + (snapshotIndex+1) + ' / ' + numSnapshots + ' (t=' + t.toFixed(3) + ' s)';
				snapshotIndex++;
				if (snapshotIndex >= numSnapshots) {
					capturer.stop(); capturer.save(); finished = true;
					document.getElementById('info').textContent = 'Saved ' + numSnapshots + ' PNG snapshots.';
					return;
				}
				requestAnimationFrame(animate);
			}

			init();
		</script>
	</body>
</html>
